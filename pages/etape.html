<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étape du Tour de France 2026</title>
    <link rel="icon" href="/assets/icons/logo_tdf.png" sizes="16x16">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="etape-page">
    <header>
        <h1>Étape du Tour de France 2026</h1>
        <a href="/index.html" class="back-link">← Retour à la frise</a>
    </header>

    <main class="etape-detail">
        <div class="etape-header">
            <h2>Étape <span id="etape-num">...</span></h2>
            <p id="date">...</p>
        </div>

        <div class="etape-info">
            <div class="etape-location">
                <h3>Départ</h3>
                <p id="depart">...</p>
            </div>

            <div class="etape-arrow">
                <span>→</span>
            </div>

            <div class="etape-location">
                <h3>Arrivée</h3>
                <p id="arrivee">...</p>
            </div>
        </div>

        <div class="etape-stats">
            <p><strong>Distance :</strong> <span id="distance">...</span></p>
            <p><strong>Type :</strong> <span id="type">...</span></p>
        </div>

        <div class="etape-error">
            ❌ Étape non trouvée ou données indisponibles.
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Projet de mémoire Tour de France 2026 - Panitech Academy</p>
        </div>
    </footer>

    <script src="../js/script-etape.js"></script>
</body>

</html>
